<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  /* COLORI ESTIVI: Sfondo sfumato che ricorda un tramonto in spiaggia */
  body {
    background: linear-gradient(135deg, #FFF9D2 0%, #FFE0B2 50%, #FFCC80 100%);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60px;
    background-color: #00BCD4; /* Azzurro mare estivo */
    z-index: 1;
    opacity: 0.8;
  }

  .coupon-container {
    background: rgba(255, 255, 255, 0.85); /* Sfondo semi-trasparente per far risaltare il tramonto */
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(255, 112, 67, 0.2);
    text-align: center;
    max-width: 550px;
    padding: 40px 30px 30px;
    z-index: 10;
    position: relative;
    margin: 20px;
  }

  .lips-icon {
    font-size: 5rem;
    line-height: 1;
    margin-bottom: 5px;
    display: inline-block;
    filter: drop-shadow(0px 4px 6px rgba(233, 30, 99, 0.4)); /* Hot pink shadow */
  }

  /* ANIMAZIONE ZOOM IN / ZOOM OUT */
  @keyframes zoomInOut {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); color: #FF3D00; } /* Diventa più acceso quando fa zoom */
  }

  h1 {
    color: #FF5722; /* Arancione acceso estivo */
    font-size: 2.6rem;
    font-weight: 900;
    margin: 10px 0 5px 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    animation: zoomInOut 2s infinite ease-in-out; /* Applicazione dell'animazione */
  }

    margin-top: 0;

    margin-bottom: 30px;

    border-radius: 50%;

    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #E65100;
    font-weight: 800;
    font-size: 0.9rem;
    line-height: 1.5;
    background: white;
  }

    font-size: 1.1rem;
    line-height: 1.6;
